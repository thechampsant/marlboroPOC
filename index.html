<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Scan Pack Code — InField</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  /* ── Design tokens ─────────────────────────────────────────── */
  :root {
    --color-cta-red:        #c8172f;
    --color-cta-red-hover:  #a81226;
    --color-red-deep:       #980015;
    --color-red-bright:     #e72b3b;
    --color-surface-deep:   #080000;
    --color-grey-line:      #494a4b;
    --color-grey-light:     #7d7e7f;
    --color-ink:            #282829;
    --color-success:        #13c05d;

    --font-sans:    "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif;
    --font-data:    "Inter", ui-sans-serif, system-ui, sans-serif;
    --font-serif:   "Playfair Display", Georgia, "Times New Roman", serif;

    --radius-button: 8px;
    --radius-field:  8px;

    --glow-red-sm:  0 0 16px rgba(200,23,47,.40);
    --glow-cta:     0 0 20px rgba(200,23,47,.45), 0 4px 12px rgba(200,23,47,.30);
    --gradient-cta: linear-gradient(to bottom, #c8172f, #980015);
    --gradient-hero-glow: radial-gradient(ellipse 320px 380px at 50% 30%, #5a0d12 0%, #3a0508 28%, #1a0205 52%, #080000 78%);

    --ui-fg:          #ffffff;
    --ui-fg-muted:    rgba(255,255,255,.6);
    --ui-field-bg:    rgba(8,0,0,.5);
    --ui-field-fg:    #ffffff;
    --ui-border:      var(--color-grey-line);
    --ui-placeholder: var(--color-grey-light);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; width: 100%;
    background: #000;
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  #app {
    position: fixed; inset: 0;
    overflow: hidden;
  }

  .screen {
    position: absolute; inset: 0;
  }

  /* ── Buttons ───────────────────────────────────────────────── */
  .btn {
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 52px;
    border: none; cursor: pointer;
    font-family: var(--font-sans); font-size: 16px; font-weight: 600;
    border-radius: var(--radius-button);
    transition: opacity .15s, transform .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(.97); opacity: .85; }
  .btn-primary {
    background: var(--gradient-cta);
    color: #fff;
    box-shadow: var(--glow-cta);
  }
  .btn-ghost {
    background: transparent;
    color: rgba(255,255,255,.75);
  }

  /* ── Field ─────────────────────────────────────────────────── */
  .field-wrap { display: flex; flex-direction: column; gap: 6px; }
  .field-label {
    font-family: var(--font-data); font-size: 11px; font-weight: 600;
    letter-spacing: .8px; text-transform: uppercase; color: rgba(255,255,255,.5);
  }
  .field-input {
    width: 100%; height: 52px;
    background: var(--ui-field-bg);
    border: 1.5px solid var(--ui-border);
    border-radius: var(--radius-field);
    color: var(--ui-field-fg);
    font-family: var(--font-data); font-size: 18px; font-weight: 600;
    letter-spacing: 2px;
    padding: 0 14px;
    outline: none;
    transition: border-color .2s;
  }
  .field-input:focus { border-color: var(--color-cta-red); box-shadow: var(--glow-red-sm); }

  /* ── Spinner ───────────────────────────────────────────────── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,.15);
    border-top-color: var(--color-cta-red);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }

  /* ── Splash screen ─────────────────────────────────────────── */
  @keyframes splash-fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes splash-glow-pulse {
    0%, 100% { opacity: .85; }
    50%      { opacity: 1; }
  }
  .splash-glow {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 30% 22%, rgba(231,43,59,.55) 0%, rgba(152,0,21,.30) 32%, rgba(8,0,0,0) 62%),
      radial-gradient(ellipse 65% 45% at 72% 70%, rgba(231,43,59,.45) 0%, rgba(152,0,21,.22) 34%, rgba(8,0,0,0) 64%),
      var(--color-surface-deep);
    animation: splash-glow-pulse 4s ease-in-out infinite;
  }
  .splash-wordmark {
    font-family: var(--font-serif);
    font-weight: 800;
    font-size: 56px;
    line-height: 1;
    color: #fff;
    letter-spacing: -1px;
    text-shadow: 0 2px 24px rgba(0,0,0,.5);
  }
  .splash-divider {
    width: 48px; height: 1px;
    background: rgba(255,255,255,.35);
    margin: 22px 0;
  }
  .splash-title {
    font-family: var(--font-sans);
    font-weight: 700; font-size: 26px;
    color: #fff; letter-spacing: -.2px;
  }
  .splash-subtitle {
    font-family: var(--font-data);
    font-weight: 600; font-size: 13px;
    letter-spacing: 4px; text-transform: uppercase;
    color: var(--color-grey-light);
    margin-top: 8px;
  }

  /* ── Scan-line animation ───────────────────────────────────── */
  @keyframes scan-line {
    0%   { top: 0; opacity: 1; }
    48%  { top: 100%; opacity: 1; }
    50%  { top: 100%; opacity: 0; }
    52%  { top: 0; opacity: 0; }
    54%  { top: 0; opacity: 1; }
    100% { top: 100%; opacity: 1; }
  }
  .scan-line {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent 0%, var(--color-cta-red) 20%, var(--color-red-bright) 50%, var(--color-cta-red) 80%, transparent 100%);
    box-shadow: var(--glow-red-sm);
    animation: scan-line 2s ease-in-out infinite;
  }

  /* ── Corner brackets ───────────────────────────────────────── */
  .bracket { position: absolute; width: 26px; height: 26px; }
  .bracket-tl { top: -3px; left: -3px; border-top: 4px solid var(--color-cta-red); border-left: 4px solid var(--color-cta-red); border-radius: 10px 0 0 0; }
  .bracket-tr { top: -3px; right: -3px; border-top: 4px solid var(--color-cta-red); border-right: 4px solid var(--color-cta-red); border-radius: 0 10px 0 0; }
  .bracket-bl { bottom: -3px; left: -3px; border-bottom: 4px solid var(--color-cta-red); border-left: 4px solid var(--color-cta-red); border-radius: 0 0 0 10px; }
  .bracket-br { bottom: -3px; right: -3px; border-bottom: 4px solid var(--color-cta-red); border-right: 4px solid var(--color-cta-red); border-radius: 0 0 10px 0; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── State machine ────────────────────────────────────────────────
let currentState = 'splash';
let packCode = '';
let cameraStream = null;
let splashShown = false;

function stopCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
}

async function initCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setState('no-camera');
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    const video = document.getElementById('camera-feed');
    if (!video) { stream.getTracks().forEach(t => t.stop()); return; }
    video.srcObject = stream;
    cameraStream = stream;
  } catch (err) {
    stopCamera();
    setState('no-camera');
  }
}

function captureFrame() {
  const video = document.getElementById('camera-feed');
  if (!video || !cameraStream) return null;
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
  canvas.getContext('2d').drawImage(video, 0, 0);
  return canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
}

function setState(s) {
  if (currentState === 'capture' && s !== 'capture') stopCamera();
  currentState = s;
  render();
}

// ── Icon helper ──────────────────────────────────────────────────
function icon(name, size = 24, color = '#ffffff') {
  return `<i data-lucide="${name}" style="width:${size}px;height:${size}px;color:${color};display:block;"></i>`;
}

function refreshIcons() {
  if (window.lucide) lucide.createIcons();
}

// ── Screen 0: Splash ─────────────────────────────────────────────
function screenSplash() {
  return `
    <div style="position:relative;width:100%;height:100%;overflow:hidden;">
      <div aria-hidden="true" class="splash-glow"></div>
      <div style="position:relative;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 32px;animation:splash-fade-in .6s ease-out both;">
        <div class="splash-wordmark">Marlboro</div>
        <div class="splash-divider"></div>
        <div class="splash-title">InField</div>
        <div class="splash-subtitle">Field Agent</div>
      </div>
      <div style="position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 96px);left:0;right:0;display:flex;justify-content:center;z-index:6;">
        <div class="spinner" style="width:32px;height:32px;border-width:2.5px;"></div>
      </div>
      <div style="position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 36px);left:0;right:0;text-align:center;z-index:6;">
        <span style="font-family:var(--font-data);font-size:13px;color:var(--color-grey-light);">Version 2.4 &middot; PMI</span>
      </div>
    </div>`;
}

// ── Screen 1: Capture ────────────────────────────────────────────
function screenCapture() {
  return `
    <div style="position:relative;width:100%;height:100%;background:#000;overflow:hidden;">
      <!-- live camera feed -->
      <video id="camera-feed" autoplay muted playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;"></video>

      <!-- close -->
      <button style="position:absolute;top:env(safe-area-inset-top,20px);top:calc(env(safe-area-inset-top,0px) + 20px);left:20px;width:40px;height:40px;border-radius:100px;background:rgba(0,0,0,.45);border:none;display:flex;align-items:center;justify-content:center;z-index:6;cursor:pointer;-webkit-tap-highlight-color:transparent;">
        ${icon('x', 20)}
      </button>

      <!-- guide label -->
      <div style="position:absolute;top:40%;left:0;right:0;text-align:center;z-index:6;padding:0 40px;transform:translateY(-96px);">
        <span style="font-family:var(--font-sans);font-size:15px;font-weight:600;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.6);">Align the code line with the frame</span>
      </div>

      <!-- scan guide frame -->
      <div style="position:absolute;top:44%;left:50%;transform:translate(-50%,-50%);width:270px;height:160px;border-radius:14px;border:2.5px solid var(--color-cta-red);box-shadow:0 0 0 2000px rgba(0,0,0,.55),var(--glow-red-sm);z-index:5;">
        <span class="bracket bracket-tl"></span>
        <span class="bracket bracket-tr"></span>
        <span class="bracket bracket-bl"></span>
        <span class="bracket bracket-br"></span>
        <div style="position:absolute;inset:0;overflow:hidden;border-radius:12px;">
          <div class="scan-line"></div>
        </div>
      </div>

      <!-- shutter -->
      <div style="position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 32px);left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:14px;z-index:6;">
        <button onclick="triggerCapture()" style="width:76px;height:76px;border-radius:100px;background:#fff;border:4px solid var(--color-cta-red);box-shadow:var(--glow-cta);cursor:pointer;transition:transform .1s;-webkit-tap-highlight-color:transparent;" onmousedown="this.style.transform='scale(.93)'" onmouseup="this.style.transform=''"></button>
        <span style="font-family:var(--font-sans);font-size:13px;color:rgba(255,255,255,.7);text-align:center;padding:0 48px;">Make sure the pack is well lit and in focus</span>
      </div>
    </div>`;
}

// ── Screen 2: Processing ─────────────────────────────────────────
function screenProcessing() {
  return `
    <div style="position:relative;width:100%;height:100%;background:#0a0a0b;overflow:hidden;">
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse 220% 120% at 50% 20%,#1a1a1c 0%,#0d0d0f 45%,#060607 100%);"></div>

      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:6;">
        <div class="spinner"></div>
        <span style="font-family:var(--font-sans);font-size:16px;font-weight:600;color:#fff;">Reading code&hellip;</span>
      </div>

      <div style="position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 40px);left:0;right:0;text-align:center;z-index:6;">
        <button class="btn btn-ghost" onclick="setState('capture')" style="width:auto;height:auto;padding:8px 24px;">Cancel</button>
      </div>
    </div>`;
}

// ── Screen 3: Success ────────────────────────────────────────────
function screenSuccess() {
  return `
    <div style="position:relative;width:100%;height:100%;background:var(--color-surface-deep);overflow:hidden;">
      <div aria-hidden="true" style="position:absolute;inset:0;background:var(--gradient-hero-glow);"></div>
      <div style="position:relative;height:100%;display:flex;flex-direction:column;padding:calc(env(safe-area-inset-top,0px) + 28px) 20px calc(env(safe-area-inset-bottom,0px) + 24px);">
        <!-- pack icon -->
        <div style="width:56px;height:56px;border-radius:100px;background:rgba(19,192,93,.15);display:flex;align-items:center;justify-content:center;margin-bottom:16px;flex-shrink:0;">
          ${icon('check-circle', 28, 'var(--color-success)')}
        </div>

        <!-- field -->
        <div class="field-wrap" style="margin-bottom:10px;">
          <div class="field-label">Pack code</div>
          <input class="field-input" id="pack-code-input" type="text" value="${packCode}" oninput="packCode=this.value">
        </div>
        <p style="font-size:14px;color:var(--ui-fg-muted);line-height:1.5;margin-bottom:auto;">Check this matches the pack before confirming</p>

        <!-- actions -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:24px;">
          <button class="btn btn-primary" onclick="handleConfirm()">Confirm</button>
          <button class="btn btn-ghost" onclick="setState('capture')">Retake photo</button>
        </div>
      </div>
    </div>`;
}

// ── Screen 4: No code ────────────────────────────────────────────
function screenNoCode() {
  return `
    <div style="position:relative;width:100%;height:100%;background:#000;overflow:hidden;">
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse 220% 120% at 50% 20%,#1a1a1c 0%,#0d0d0f 45%,#060607 100%);"></div>

      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:0 40px;text-align:center;z-index:6;">
        <div style="width:64px;height:64px;border-radius:100px;background:rgba(200,23,47,.15);display:flex;align-items:center;justify-content:center;">
          ${icon('scan-line', 30, 'var(--color-cta-red)')}
        </div>
        <h2 style="font-size:22px;font-weight:700;color:#fff;letter-spacing:-.3px;">Couldn&rsquo;t read a code</h2>
        <p style="font-size:15px;color:rgba(255,255,255,.7);line-height:1.5;">Make sure the pack is flat, in focus, and well lit, then try again.</p>
      </div>

      <div style="position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 32px);left:20px;right:20px;display:flex;flex-direction:column;align-items:center;gap:14px;z-index:6;">
        <button class="btn btn-primary" onclick="setState('capture')">Try again</button>
        <button class="btn btn-ghost" onclick="setState('capture')">Cancel</button>
      </div>
    </div>`;
}

// ── Screen 5: Camera permission ──────────────────────────────────
function screenNoCamera() {
  return `
    <div style="position:relative;width:100%;height:100%;background:var(--color-surface-deep);overflow:hidden;">
      <div style="position:relative;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px 40px;text-align:center;">
        <div style="width:64px;height:64px;border-radius:100px;background:rgba(200,23,47,.15);display:flex;align-items:center;justify-content:center;">
          ${icon('camera-off', 30, 'var(--color-cta-red)')}
        </div>
        <h2 style="font-size:22px;font-weight:700;color:#fff;letter-spacing:-.3px;">Camera access needed</h2>
        <p style="font-size:15px;color:rgba(255,255,255,.7);line-height:1.5;">InField needs camera access to scan pack codes. Enable it in your device settings.</p>
      </div>

      <div style="position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 32px);left:20px;right:20px;display:flex;flex-direction:column;align-items:center;gap:14px;">
        <button class="btn btn-primary" onclick="alert('Opening Settings…')">Open settings</button>
        <button class="btn btn-ghost" onclick="setState('capture')">Cancel</button>
      </div>
    </div>`;
}

// ── Screen 6: Network error ──────────────────────────────────────
function screenNoNetwork() {
  return `
    <div style="position:relative;width:100%;height:100%;background:var(--color-surface-deep);overflow:hidden;">
      <div style="position:relative;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px 40px;text-align:center;">
        <div style="width:64px;height:64px;border-radius:100px;background:rgba(200,23,47,.15);display:flex;align-items:center;justify-content:center;">
          ${icon('wifi-off', 30, 'var(--color-cta-red)')}
        </div>
        <h2 style="font-size:22px;font-weight:700;color:#fff;letter-spacing:-.3px;">Couldn&rsquo;t reach the server</h2>
        <p style="font-size:15px;color:rgba(255,255,255,.7);line-height:1.5;">Check your connection and try again.</p>
      </div>

      <div style="position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 32px);left:20px;right:20px;display:flex;flex-direction:column;align-items:center;gap:14px;">
        <button class="btn btn-primary" onclick="setState('capture')">Retry</button>
        <button class="btn btn-ghost" onclick="setState('capture')">Cancel</button>
      </div>
    </div>`;
}

const SCREENS = {
  splash:     screenSplash,
  capture:    screenCapture,
  processing: screenProcessing,
  success:    screenSuccess,
  'no-code':  screenNoCode,
  'no-camera':screenNoCamera,
  'no-network':screenNoNetwork,
};

// ── Handlers ─────────────────────────────────────────────────────
async function triggerCapture() {
  const imageBase64 = captureFrame();
  if (!imageBase64) return;

  setState('processing');

  try {
    const resp = await fetch('/pack-scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageBase64 })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (!data.found || data.confidence === 'low') {
      setState('no-code');
    } else {
      packCode = data.code;
      setState('success');
    }
  } catch (err) {
    setState('no-network');
  }
}

function handleConfirm() {
  const input = document.getElementById('pack-code-input');
  if (input) packCode = input.value;
  const btn = document.querySelector('.btn-primary');
  if (btn) {
    btn.textContent = '✓ Confirmed';
    btn.style.background = '#13c05d';
    btn.style.boxShadow = '0 0 20px rgba(19,192,93,.4)';
  }
  setTimeout(() => setState('capture'), 1000);
}

// ── Render ───────────────────────────────────────────────────────
function render() {
  const screenFn = SCREENS[currentState] || screenCapture;
  document.getElementById('app').innerHTML = `
    <div class="screen">${screenFn()}</div>`;
  refreshIcons();
  if (currentState === 'capture') initCamera();
  if (currentState === 'splash' && !splashShown) {
    splashShown = true;
    setTimeout(() => { if (currentState === 'splash') setState('capture'); }, 2500);
  }
}

render();
</script>
</body>
</html>
